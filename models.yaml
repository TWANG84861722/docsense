# ════════════════════════════════════════════════════════════
#  Model provider configuration -- switch models in one place.
#  Just change `active` below: openai / claude / gemini / qwen / local
#  (embedding and reranker still run locally; see config.py, not switched here.)
# ════════════════════════════════════════════════════════════

active: qwen

# Optional: point the LLM and the VL model at different providers
# (leave blank = both use `active` above).
# e.g. llm_override: claude  → answering uses Claude, image reading still uses active's qwen
llm_override:
vl_override:

# Every provider speaks the OpenAI-compatible API, so the single `openai` library is enough.
# Before switching to a provider, make sure its api_key_env is set in .env / the environment.
providers:

  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    chat_model: gpt-4o
    vl_model: gpt-4o

  claude:
    base_url: https://api.anthropic.com/v1/
    api_key_env: ANTHROPIC_API_KEY
    chat_model: claude-sonnet-4-6
    vl_model: claude-sonnet-4-6

  gemini:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    api_key_env: GEMINI_API_KEY
    chat_model: gemini-2.5-flash
    vl_model: gemini-2.5-flash

  qwen:
    base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    api_key_env: DASHSCOPE_API_KEY
    chat_model: qwen-plus            # Used for answering; can also swap to qwen-max / qwen-turbo.
    vl_model: qwen-vl-max            # Used for image *understanding*. Keep plus day-to-day to save
                                      # Max quota; when ingesting a figure-heavy new paper, temporarily
                                      # switch back to qwen-vl-max (noticeably better) then switch back.
                                      # Note: chat uses chat_model (qwen-plus) and never touches vl_model,
                                      # so everyday conversation is unaffected by this line.
    ocr_model: qwen-vl-ocr            # Dedicated to 'transcribing' scanned pages / tables: accurate at
                                      # reading text, cheap, and does not burn vl-max quota.
                                      # (Providers without an ocr_model auto-fall back to vl_model, so
                                      # "swap provider in one place" is not broken.)

  local:
    # Local mode requires an OpenAI-compatible server running first, for example:
    #   python -m mlx_lm.server --model /Users/taowang/models/Qwen3-8B-4bit --port 8080
    base_url: http://localhost:8080/v1
    api_key_env:                     # No key needed locally.
    chat_model: local-model
    vl_model: local-model
